<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyrex's Tic Tac Toe</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/index.js" defer></script>
</head>
<body>
    <div>Tic-Tac-Toe</div>
    <div>
        <p></p>
        <div></div>
       <button type="button">Restart</button>
        <footer>Copyright © 2021</footer>
    </div>
    <div class="prompt">
        <form action="">
            <p>
                <label for="pXName">Player X</label>
                <input type="text" id="pXName" maxlength="10" placeholder="Enter name" value="Kaiden">
            </p>
            <p>
                <label for="pONname">Player O</label>
                <input type="text" id="pOName" maxlength="10" placeholder="Enter name" value="Alenko">
            </p>
            <button type="button">Start</button>
        </form>
    </div>
</body>
</html>
